name: Trigger Daily Dashboard Email

on:
  schedule:
    - cron: '0 10 28-31 * *'
      timezone: "Asia/Kolkata"
  workflow_dispatch:

jobs:
  trigger_daily_email:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          DAILY_EMAIL_TRIGGER_URL: ${{ secrets.DAILY_EMAIL_TRIGGER_URL }}
          DAILY_EMAIL_CRON_SECRET: ${{ secrets.DAILY_EMAIL_CRON_SECRET }}
        run: |
          if [ -z "$DAILY_EMAIL_TRIGGER_URL" ]; then
            echo "Missing secret: DAILY_EMAIL_TRIGGER_URL"
            exit 1
          fi

          if [ -z "$DAILY_EMAIL_CRON_SECRET" ]; then
            echo "Missing secret: DAILY_EMAIL_CRON_SECRET"
            exit 1
          fi

      - name: Call daily summary endpoint
        env:
          DAILY_EMAIL_TRIGGER_URL: ${{ secrets.DAILY_EMAIL_TRIGGER_URL }}
          DAILY_EMAIL_CRON_SECRET: ${{ secrets.DAILY_EMAIL_CRON_SECRET }}
        run: |
          curl --request POST \
            --url "$DAILY_EMAIL_TRIGGER_URL" \
            --header "content-type: application/json" \
            --header "x-cron-secret: $DAILY_EMAIL_CRON_SECRET" \
            --data '{"source":"github-actions","trigger":"schedule"}' \
            --silent \
            --show-error \
            --fail-with-body
